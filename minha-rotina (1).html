<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Rotina</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.07);
    --text: #f0ede8;
    --muted: #6b6760;
    --accent: #c8f542;
    --accent-dim: rgba(200,245,66,0.12);
    --morning: #f5a742;
    --morning-dim: rgba(245,167,66,0.1);
    --afternoon: #42c8f5;
    --afternoon-dim: rgba(66,200,245,0.1);
    --evening: #a78bfa;
    --evening-dim: rgba(167,139,250,0.1);
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Layout */
  .app { max-width: 420px; margin: 0 auto; padding: 32px 20px 100px; }

  /* Header */
  .header { margin-bottom: 32px; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .date { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: .04em; }
  .streak-badge {
    display: flex; align-items: center; gap: 5px;
    background: var(--accent-dim); border: 1px solid rgba(200,245,66,0.2);
    color: var(--accent); font-size: 12px; font-weight: 500;
    padding: 4px 10px; border-radius: 20px;
    font-family: 'DM Mono', monospace;
  }
  .greeting { font-size: 26px; font-weight: 600; line-height: 1.2; margin-bottom: 20px; }
  .greeting span { color: var(--accent); }

  /* Progress ring */
  .progress-block {
    background: var(--surface); border-radius: var(--radius);
    padding: 20px; display: flex; align-items: center; gap: 20px;
    margin-bottom: 28px; border: 1px solid var(--border);
  }
  .ring-wrap { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 5; }
  .ring-fill { fill: none; stroke: var(--accent); stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset .6s cubic-bezier(.4,0,.2,1); }
  .ring-text {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .ring-pct { font-size: 18px; font-weight: 600; line-height: 1; font-family: 'DM Mono', monospace; }
  .ring-label { font-size: 9px; color: var(--muted); margin-top: 1px; text-transform: uppercase; letter-spacing: .06em; }
  .progress-info { flex: 1; }
  .progress-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .progress-sub { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .progress-bar-wrap { margin-top: 10px; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width .6s cubic-bezier(.4,0,.2,1); }

  /* Section */
  .section { margin-bottom: 24px; }
  .section-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 12px;
  }
  .section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .section-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
  .section-count { font-size: 11px; color: var(--muted); margin-left: auto; font-family: 'DM Mono', monospace; }

  /* Habit card */
  .habit {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px;
    margin-bottom: 8px; cursor: pointer;
    transition: background .15s, border-color .15s, transform .1s;
    user-select: none; -webkit-tap-highlight-color: transparent;
    position: relative; overflow: hidden;
  }
  .habit:active { transform: scale(0.985); }
  .habit.done { background: var(--surface); opacity: .55; }
  .habit.done .habit-name { text-decoration: line-through; color: var(--muted); }
  .habit.just-done { animation: pop .3s ease forwards; }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }
  .habit-ripple {
    position: absolute; inset: 0; opacity: 0;
    background: var(--accent-dim);
    transition: opacity .3s;
  }
  .habit.just-done .habit-ripple { opacity: 1; }

  .check {
    width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    transition: all .2s cubic-bezier(.4,0,.2,1);
    background: transparent;
  }
  .check svg { opacity: 0; transform: scale(0.5); transition: all .2s cubic-bezier(.34,1.56,.64,1); }
  .habit.done .check { background: var(--accent); border-color: var(--accent); }
  .habit.done .check svg { opacity: 1; transform: scale(1); }

  .habit-icon { font-size: 20px; flex-shrink: 0; }
  .habit-info { flex: 1; min-width: 0; }
  .habit-name { font-size: 14px; font-weight: 500; transition: color .2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .habit-time { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .habit-color { width: 3px; height: 36px; border-radius: 2px; flex-shrink: 0; }

  /* Week */
  .week-block {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px; margin-bottom: 24px;
  }
  .week-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 14px; }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .week-day { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .week-day-name { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; font-family: 'DM Mono', monospace; }
  .week-circle {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500; font-family: 'DM Mono', monospace;
    color: var(--muted); background: var(--surface2);
    border: 1px solid transparent; transition: all .2s;
  }
  .week-circle.today { border-color: var(--accent); color: var(--accent); }
  .week-circle.full { background: var(--accent); color: #0f0f0f; font-weight: 600; }
  .week-circle.partial { background: var(--accent-dim); color: var(--accent); border-color: rgba(200,245,66,0.3); }
  .week-circle.future { opacity: .3; }

  /* Bottom bar */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(15,15,15,0.92); backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; align-items: center;
    padding: 10px 0 max(10px, env(safe-area-inset-bottom));
  }
  .tab {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-size: 10px; color: var(--muted); cursor: pointer;
    padding: 4px 20px; transition: color .15s;
    font-family: 'DM Mono', monospace; letter-spacing: .03em;
  }
  .tab.active { color: var(--accent); }
  .tab-icon { font-size: 20px; line-height: 1; }

  /* Stats view */
  .view { display: none; }
  .view.active { display: block; }

  /* Stats */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 16px;
  }
  .stat-value { font-size: 28px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--text); margin-bottom: 2px; }
  .stat-value.accent { color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }

  .habit-stats { display: flex; flex-direction: column; gap: 8px; }
  .hstat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .hstat-icon { font-size: 18px; }
  .hstat-info { flex: 1; }
  .hstat-name { font-size: 13px; font-weight: 500; margin-bottom: 5px; }
  .hstat-bar-bg { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .hstat-bar { height: 100%; border-radius: 2px; background: var(--accent); min-width: 4px; }
  .hstat-pct { font-size: 12px; color: var(--accent); font-family: 'DM Mono', monospace; font-weight: 500; }

  /* Add habit view */
  .form-block {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
  }
  .form-label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; display: block; }
  .form-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: border-color .15s;
  }
  .form-input:focus { border-color: rgba(200,245,66,0.4); }
  .emoji-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .emoji-btn {
    width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .15s, background .15s;
  }
  .emoji-btn.selected { border-color: var(--accent); background: var(--accent-dim); }
  .period-btns { display: flex; gap: 8px; }
  .period-btn {
    flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--muted); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .15s; font-family: 'DM Sans', sans-serif;
  }
  .period-btn.selected.morning { border-color: var(--morning); color: var(--morning); background: var(--morning-dim); }
  .period-btn.selected.afternoon { border-color: var(--afternoon); color: var(--afternoon); background: var(--afternoon-dim); }
  .period-btn.selected.evening { border-color: var(--evening); color: var(--evening); background: var(--evening-dim); }
  .save-btn {
    width: 100%; padding: 14px; border-radius: var(--radius-sm);
    background: var(--accent); color: #0f0f0f; font-size: 15px; font-weight: 600;
    border: none; cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: opacity .15s; margin-top: 8px;
  }
  .save-btn:hover { opacity: .88; }
  .habit-manage {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 8px;
  }
  .del-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 18px; padding: 4px; transition: color .15s; line-height: 1;
  }
  .del-btn:hover { color: #f55; }
  .section-title-big { font-size: 20px; font-weight: 600; margin-bottom: 16px; }
  .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 14px; }
  .notif-btn {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 16px;
    color: var(--muted); font-size: 13px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; width: 100%; margin-top: 12px;
    transition: border-color .15s, color .15s;
  }
  .notif-btn:hover { border-color: rgba(200,245,66,0.3); color: var(--text); }
  .notif-btn.on { color: var(--accent); border-color: rgba(200,245,66,0.3); }
  .form-row { margin-bottom: 16px; }

  /* Login */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; position: fixed; inset: 0; z-index: 999; background: var(--bg);
  }
  .login-box {
    width: 100%; max-width: 360px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 36px 28px;
  }
  .login-logo { font-size: 36px; margin-bottom: 8px; }
  .login-title { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .login-label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; display: block; }
  .login-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 13px 16px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
    outline: none; transition: border-color .15s; margin-bottom: 16px;
  }
  .login-input:focus { border-color: rgba(200,245,66,0.4); }
  .login-btn {
    width: 100%; padding: 14px; border-radius: var(--radius-sm);
    background: var(--accent); color: #0f0f0f; font-size: 15px; font-weight: 600;
    border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity .15s;
  }
  .login-btn:hover { opacity: .88; }
  .login-error { font-size: 13px; color: #f87171; margin-top: 12px; text-align: center; display: none; }
</style>
</head>
<body>


<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🗓</div>
    <div class="login-title">Minha Rotina</div>
    <div class="login-sub">Entre para acessar seu app</div>
    <label class="login-label">Senha</label>
    <input class="login-input" type="password" id="login-input" placeholder="Digite sua senha"
      onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">Entrar →</button>
    <div class="login-error" id="login-error">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<div class="app" id="view-home">
  <div class="header">
    <div class="header-top">
      <div class="date" id="date-label"></div>
      <div class="streak-badge">🔥 <span id="streak-num">0</span> dias</div>
    </div>
    <div class="greeting">Bom dia,<br><span id="greeting-name">vamos nessa</span> 👋</div>
  </div>

  <div class="progress-block">
    <div class="ring-wrap">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <circle class="ring-bg" cx="36" cy="36" r="30"/>
        <circle class="ring-fill" id="ring" cx="36" cy="36" r="30"
          stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
      </svg>
      <div class="ring-text">
        <div class="ring-pct" id="ring-pct">0%</div>
        <div class="ring-label">hoje</div>
      </div>
    </div>
    <div class="progress-info">
      <div class="progress-title" id="prog-title">Comece o dia!</div>
      <div class="progress-sub" id="prog-sub">0 de <span id="total-count">0</span> hábitos completos</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="prog-bar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div id="habits-container"></div>

  <div class="week-block">
    <div class="week-label">Esta semana</div>
    <div class="week-grid" id="week-grid"></div>
  </div>
</div>

<div class="app view" id="view-stats">
  <div class="greeting" style="margin-bottom:24px">Progresso <span>📈</span></div>
  <div class="stat-grid" id="stat-grid"></div>
  <div class="habit-stats" id="habit-stats"></div>
</div>

<div class="app view" id="view-add">
  <div class="greeting" style="margin-bottom:24px">Gerenciar <span>✏️</span></div>

  <div class="form-block">
    <div class="section-title-big" style="font-size:15px;margin-bottom:16px;color:var(--muted)">Adicionar hábito</div>
    <div class="form-row">
      <label class="form-label">Nome</label>
      <input class="form-input" id="new-name" placeholder="Ex: Meditação" maxlength="40">
    </div>
    <div class="form-row">
      <label class="form-label">Ícone</label>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>
    <div class="form-row">
      <label class="form-label">Horário</label>
      <input class="form-input" id="new-time" placeholder="Ex: 19h00" maxlength="10">
    </div>
    <div class="form-row">
      <label class="form-label">Período</label>
      <div class="period-btns">
        <button class="period-btn morning selected" onclick="selectPeriod('morning')">🌅 Manhã</button>
        <button class="period-btn afternoon" onclick="selectPeriod('afternoon')">☀️ Tarde</button>
        <button class="period-btn evening" onclick="selectPeriod('evening')">🌙 Noite</button>
      </div>
    </div>
    <button class="save-btn" onclick="addHabit()">Adicionar hábito</button>
  </div>

  <div>
    <div class="section-title-big" style="font-size:15px;margin-bottom:12px;color:var(--muted)">Meus hábitos</div>
    <div id="manage-list"></div>
  </div>
</div>

<div class="bottom-bar">
  <div class="tab active" onclick="switchTab('home')" id="tab-home">
    <div class="tab-icon">◎</div>
    <div>Hoje</div>
  </div>
  <div class="tab" onclick="switchTab('stats')" id="tab-stats">
    <div class="tab-icon">▦</div>
    <div>Stats</div>
  </div>
  <div class="tab" onclick="switchTab('add')" id="tab-add">
    <div class="tab-icon">+</div>
    <div>Hábitos</div>
  </div>
</div>

<script>
const DEFAULT_HABITS = [
  { id: 'exer',    name: 'Exercício físico',       icon: '🏃', time: '19h00', period: 'evening',   color: '#f5a742' },
  { id: 'news',    name: 'Notícias & atualidades', icon: '📰', time: '8h00',  period: 'morning',   color: '#42a5f5' },
  { id: 'emprego', name: 'Procurar emprego',        icon: '💼', time: '9h00',  period: 'morning',   color: '#a78bfa' },
  { id: 'banking', name: 'Corporate Banking',       icon: '🏦', time: '10h30', period: 'morning',   color: '#4ade80' },
  { id: 'poly',    name: 'Polymarket',              icon: '📊', time: '14h00', period: 'afternoon', color: '#fb923c' },
  { id: 'hist',    name: 'História & contexto',     icon: '🌍', time: '15h30', period: 'afternoon', color: '#f472b6' },
  { id: 'livro',   name: 'Leitura de livro',        icon: '📚', time: '17h00', period: 'afternoon', color: '#c8f542' },
];

const EMOJIS = ['🏃','📰','💼','🏦','📊','🌍','📚','🧘','💪','🎯','✍️','🎨','🎸','🍎','💊','🧠','🌿','☕','🚴','🏊'];

let selectedEmoji = '🎯';
let selectedPeriod = 'morning';

function getStorage() {
  try { return JSON.parse(localStorage.getItem('rotina_v3') || '{}'); } catch(e) { return {}; }
}
function setStorage(d) {
  try { localStorage.setItem('rotina_v3', JSON.stringify(d)); } catch(e) {}
}
function todayKey() { return new Date().toISOString().slice(0, 10); }
function getHabits() {
  const s = getStorage();
  if (!s.habits) { s.habits = DEFAULT_HABITS; setStorage(s); }
  return s.habits;
}
function getChecks() {
  const s = getStorage();
  return s.checks?.[todayKey()] || {};
}
function setCheck(id, val) {
  const s = getStorage();
  if (!s.checks) s.checks = {};
  if (!s.checks[todayKey()]) s.checks[todayKey()] = {};
  s.checks[todayKey()][id] = val;
  setStorage(s);
}
function deleteHabit(id) {
  const s = getStorage();
  s.habits = (s.habits || DEFAULT_HABITS).filter(h => h.id !== id);
  setStorage(s);
  renderAll();
}
function addHabitData(h) {
  const s = getStorage();
  if (!s.habits) s.habits = DEFAULT_HABITS;
  s.habits.push(h);
  setStorage(s);
}

function getStreak() {
  const s = getStorage();
  const habits = getHabits();
  let streak = 0;
  const today = new Date();
  for (let i = 1; i <= 60; i++) {
    const d = new Date(today); d.setDate(today.getDate() - i);
    const k = d.toISOString().slice(0, 10);
    const checks = s.checks?.[k] || {};
    const done = Object.values(checks).filter(Boolean).length;
    if (done >= habits.length) streak++;
    else break;
  }
  return streak;
}

function getWeekData() {
  const s = getStorage();
  const habits = getHabits();
  const today = new Date();
  const dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((dow + 6) % 7));
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const k = d.toISOString().slice(0, 10);
    const checks = s.checks?.[k] || {};
    const done = Object.values(checks).filter(Boolean).length;
    return { date: d, key: k, done, total: habits.length };
  });
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Bom dia,';
  if (h < 18) return 'Boa tarde,';
  return 'Boa noite,';
}

function renderHome() {
  const habits = getHabits();
  const checks = getChecks();
  const done = habits.filter(h => checks[h.id]).length;
  const total = habits.length;
  const pct = total ? Math.round((done / total) * 100) : 0;

  // Date
  const now = new Date();
  document.getElementById('date-label').textContent =
    now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });

  // Greeting
  document.getElementById('greeting-name').parentElement.childNodes[0].textContent = getGreeting() + '\n';

  // Streak
  document.getElementById('streak-num').textContent = getStreak();

  // Ring
  const circ = 188.5;
  const offset = circ - (pct / 100) * circ;
  document.getElementById('ring').style.strokeDashoffset = offset;
  document.getElementById('ring-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('total-count').textContent = total;
  document.getElementById('prog-sub').innerHTML = `${done} de <span id="total-count">${total}</span> hábitos completos`;

  const titles = ['Comece o dia! 💪', 'Bom começo!', 'Indo bem!', 'Quase lá! 🔥', 'Dia completo! 🎉'];
  const idx = pct === 100 ? 4 : pct >= 60 ? 3 : pct >= 40 ? 2 : pct > 0 ? 1 : 0;
  document.getElementById('prog-title').textContent = titles[idx];

  // Habits
  const morning = habits.filter(h => h.period === 'morning');
  const afternoon = habits.filter(h => h.period === 'afternoon');
  const evening = habits.filter(h => h.period === 'evening');
  const container = document.getElementById('habits-container');
  container.innerHTML = '';

  if (morning.length) {
    container.appendChild(makeSection('Manhã', '#f5a742', morning, checks));
  }
  if (afternoon.length) {
    container.appendChild(makeSection('Tarde', '#42c8f5', afternoon, checks));
  }
  if (evening.length) {
    container.appendChild(makeSection('Noite', '#a78bfa', evening, checks));
  }

  // Week
  const weekData = getWeekData();
  const days = ['S','T','Q','Q','S','S','D'];
  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';
  const todayStr = todayKey();
  weekData.forEach((w, i) => {
    const isToday = w.key === todayStr;
    const isFuture = w.date > new Date() && !isToday;
    const isFull = w.done >= w.total && w.total > 0;
    const isPartial = w.done > 0 && !isFull;
    let cls = 'week-circle';
    if (isFuture) cls += ' future';
    else if (isToday) cls += ' today';
    else if (isFull) cls += ' full';
    else if (isPartial) cls += ' partial';
    const col = document.createElement('div');
    col.className = 'week-day';
    col.innerHTML = `<div class="week-day-name">${days[i]}</div><div class="${cls}">${w.date.getDate()}</div>`;
    grid.appendChild(col);
  });
}

function makeSection(title, color, habits, checks) {
  const wrap = document.createElement('div');
  wrap.className = 'section';
  const doneCount = habits.filter(h => checks[h.id]).length;
  wrap.innerHTML = `
    <div class="section-header">
      <div class="section-dot" style="background:${color}"></div>
      <div class="section-title">${title}</div>
      <div class="section-count">${doneCount}/${habits.length}</div>
    </div>
  `;
  habits.forEach(h => {
    const isDone = !!checks[h.id];
    const card = document.createElement('div');
    card.className = 'habit' + (isDone ? ' done' : '');
    card.innerHTML = `
      <div class="habit-ripple"></div>
      <div class="check">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2.5 6l2.5 2.5 4.5-4.5" stroke="#0f0f0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="habit-icon">${h.icon}</div>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        <div class="habit-time">${h.time}</div>
      </div>
      <div class="habit-color" style="background:${h.color}"></div>
    `;
    card.addEventListener('click', () => {
      setCheck(h.id, !isDone);
      if (!isDone) {
        card.classList.add('just-done');
        setTimeout(() => card.classList.remove('just-done'), 300);
      }
      renderAll();
    });
    wrap.appendChild(card);
  });
  return wrap;
}

function renderStats() {
  const habits = getHabits();
  const s = getStorage();
  const checks = s.checks || {};

  const days = Object.keys(checks);
  const totalDays = days.length;
  const fullDays = days.filter(k => {
    const c = checks[k] || {};
    return Object.values(c).filter(Boolean).length >= habits.length;
  }).length;
  const streak = getStreak();
  const todayDone = habits.filter(h => (checks[todayKey()] || {})[h.id]).length;

  document.getElementById('stat-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-value accent">${streak}</div>
      <div class="stat-label">Dias seguidos</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${fullDays}</div>
      <div class="stat-label">Dias completos</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${todayDone}</div>
      <div class="stat-label">Hoje concluídos</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${totalDays}</div>
      <div class="stat-label">Dias registrados</div>
    </div>
  `;

  const statsEl = document.getElementById('habit-stats');
  statsEl.innerHTML = '';
  habits.forEach(h => {
    const total = days.length || 1;
    const done = days.filter(k => (checks[k] || {})[h.id]).length;
    const pct = Math.round((done / total) * 100);
    const el = document.createElement('div');
    el.className = 'hstat';
    el.innerHTML = `
      <div class="hstat-icon">${h.icon}</div>
      <div class="hstat-info">
        <div class="hstat-name">${h.name}</div>
        <div class="hstat-bar-bg"><div class="hstat-bar" style="width:${pct}%"></div></div>
      </div>
      <div class="hstat-pct">${pct}%</div>
    `;
    statsEl.appendChild(el);
  });
}

function renderAdd() {
  // Emoji grid
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn' + (e === selectedEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.onclick = () => {
      selectedEmoji = e;
      grid.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    grid.appendChild(btn);
  });

  // Manage list
  const habits = getHabits();
  const list = document.getElementById('manage-list');
  list.innerHTML = '';
  if (!habits.length) {
    list.innerHTML = '<div class="empty-state">Nenhum hábito ainda</div>';
    return;
  }
  habits.forEach(h => {
    const el = document.createElement('div');
    el.className = 'habit-manage';
    el.innerHTML = `
      <div style="font-size:20px">${h.icon}</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:500">${h.name}</div>
        <div style="font-size:12px;color:var(--muted);font-family:'DM Mono',monospace">${h.time}</div>
      </div>
      <button class="del-btn" onclick="deleteHabit('${h.id}')">✕</button>
    `;
    list.appendChild(el);
  });
}

function selectPeriod(p) {
  selectedPeriod = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('selected'));
  const btn = document.querySelector(`.period-btn.${p}`);
  if (btn) btn.classList.add('selected');
}

function addHabit() {
  const name = document.getElementById('new-name').value.trim();
  const time = document.getElementById('new-time').value.trim();
  if (!name) { alert('Digite um nome para o hábito'); return; }
  const colors = ['#c8f542','#f5a742','#42c8f5','#a78bfa','#f472b6','#4ade80','#fb923c'];
  const h = {
    id: 'h_' + Date.now(),
    name, icon: selectedEmoji,
    time: time || '--',
    period: selectedPeriod,
    color: colors[Math.floor(Math.random() * colors.length)]
  };
  addHabitData(h);
  document.getElementById('new-name').value = '';
  document.getElementById('new-time').value = '';
  renderAll();
}

function switchTab(tab) {
  ['home','stats','add'].forEach(t => {
    document.getElementById('view-' + t).classList.toggle('active', t === tab);
    document.getElementById('view-' + t).style.display = t === tab ? 'block' : 'none';
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'stats') renderStats();
  if (tab === 'add') renderAdd();
}

function renderAll() {
  renderHome();
  const s = getStorage();
  if (s._tab === 'stats') renderStats();
  if (s._tab === 'add') renderAdd();
}


// ---- LOGIN ----
const SENHA = 'rotina2025';

function doLogin() {
  const val = document.getElementById('login-input').value;
  const err = document.getElementById('login-error');
  if (val === SENHA) {
    document.getElementById('login-screen').style.display = 'none';
    sessionStorage.setItem('auth', '1');
    err.style.display = 'none';
  } else {
    err.style.display = 'block';
    document.getElementById('login-input').value = '';
    document.getElementById('login-input').focus();
  }
}

function checkAuth() {
  if (sessionStorage.getItem('auth') !== '1') {
    document.getElementById('login-screen').style.display = 'flex';
  } else {
    document.getElementById('login-screen').style.display = 'none';
  }
}

// Init
document.getElementById('view-home').style.display = 'block';
document.getElementById('view-stats').style.display = 'none';
document.getElementById('view-add').style.display = 'none';

// Greeting text fix
const greetEl = document.getElementById('greeting-name').parentElement;
greetEl.innerHTML = `${getGreeting()}<br><span id="greeting-name">vamos nessa</span> 👋`;

renderAll();
checkAuth();
</script>
